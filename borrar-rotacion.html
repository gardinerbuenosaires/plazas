<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Borrar rotación — Plazas GR</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #111; color: #eee; }
    input  { padding: 8px 12px; font-size: 14px; background: #222; color: #eee; border: 1px solid #444; border-radius: 6px; margin: 4px; width: 240px; }
    button { padding: 10px 24px; font-size: 16px; cursor: pointer; margin: 8px 4px; border: none; border-radius: 6px; }
    #btn-login   { background: #16a34a; color: #fff; }
    #btn-preview { background: #2563eb; color: #fff; display: none; }
    #btn-borrar  { background: #dc2626; color: #fff; display: none; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #log { margin-top: 16px; white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
    .warn{ color: #fbbf24; }
  </style>
</head>
<body>
  <h2>🗑️ Borrar rotación duplicada — Plazas GR / Mañana</h2>
  <p>Rotación: <strong>1776518178421</strong> — colección: <strong>historial_manana</strong></p>

  <div id="login-form">
    <input id="email" type="email" placeholder="Email" />
    <input id="pass"  type="password" placeholder="Contraseña" />
    <button id="btn-login" onclick="login()">Iniciar sesión</button>
  </div>
  <button id="btn-preview" onclick="preview()">1. Ver registros de esa rotación</button>
  <button id="btn-borrar"  onclick="borrar()">2. BORRAR definitivamente</button>
  <div id="log"></div>

<script type="module">
  import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, writeBatch }
                                from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword }
                                from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjH11Vi2L8hA0extiWtSRqWJATcUZw9IM",
    authDomain: "plazasgr.firebaseapp.com",
    projectId: "plazasgr",
    storageBucket: "plazasgr.firebasestorage.app",
    messagingSenderId: "139879851809",
    appId: "1:139879851809:web:bb711dc80467499c390060"
  };

  const ROTACION_ID = "1776518178421";
  const COL = "historial_manana";

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  const log = msg => { document.getElementById("log").innerHTML += msg + "\n"; };

  let candidatos = [];

  window.login = async function() {
    const email = document.getElementById("email").value.trim();
    const pass  = document.getElementById("pass").value;
    const btn   = document.getElementById("btn-login");
    btn.disabled = true; btn.textContent = "Conectando...";
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      document.getElementById("login-form").style.display = "none";
      document.getElementById("btn-preview").style.display = "inline-block";
      log('<span class="ok">✅ Sesión iniciada.</span>\n');
    } catch(e) {
      log(`<span class="err">❌ ${e.message}</span>`);
      btn.disabled = false; btn.textContent = "Iniciar sesión";
    }
  };

  window.preview = async function() {
    document.getElementById("btn-preview").disabled = true;
    log(`Buscando registros con rotacionId = ${ROTACION_ID}...\n`);
    try {
      const snap = await getDocs(query(collection(db, COL), where("rotacionId","==",ROTACION_ID)));
      candidatos = snap.docs;
      log(`<span class="${candidatos.length > 0 ? 'warn' : 'ok'}">Encontrados: ${candidatos.length} registros</span>\n`);
      candidatos.slice(0, 10).forEach(d => {
        const dd = d.data();
        log(`  ${dd.mozoNombre||'?'} — ${dd.sector||''} ${dd.subsector||''} — ts:${dd.ts ? new Date(dd.ts).toLocaleString('es-AR') : '?'}`);
      });
      if (candidatos.length > 10) log(`  ... y ${candidatos.length - 10} más`);
      if (candidatos.length > 0) document.getElementById("btn-borrar").style.display = "inline-block";
      else log('<span class="ok">Nada que borrar.</span>');
    } catch(e) {
      log(`<span class="err">❌ ${e.message}</span>`);
      document.getElementById("btn-preview").disabled = false;
    }
  };

  window.borrar = async function() {
    const btn = document.getElementById("btn-borrar");
    btn.disabled = true; btn.textContent = "Borrando...";
    log("\nIniciando borrado...");
    let borrados = 0;
    const CHUNK = 400;
    for (let i = 0; i < candidatos.length; i += CHUNK) {
      const batch = writeBatch(db);
      candidatos.slice(i, i + CHUNK).forEach(d => batch.delete(d.ref));
      await batch.commit();
      borrados += Math.min(CHUNK, candidatos.length - i);
    }
    log(`<span class="ok">✅ ${borrados} registros eliminados.</span>`);
    btn.textContent = "✅ Hecho";
  };
</script>
</body>
</html>
